name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── 백엔드 빌드 + 테스트 ─────────────────────────────────
  backend:
    name: Backend (Gradle build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build & test
        run: ./gradlew clean build --no-daemon
        env:
          # 테스트용 더미값 (application-local.yml이 없을 경우 대비)
          DB_URL: jdbc:h2:mem:testdb
          DB_USERNAME: sa
          DB_PASSWORD: ''
          JWT_SECRET: ci-dummy-secret-at-least-32-characters-long

  # ── 프론트엔드 타입 체크 + 빌드 ─────────────────────────
  frontend:
    name: Frontend (tsc + next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.com  # CI 빌드용 더미 URL
